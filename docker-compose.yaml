services:

  LLM:
    image: vllm/vllm-openai:latest
    container_name: LLM-server
    runtime: nvidia
    volumes:
      - ${HUGGINGFACE_QUANTIZE_FOLDERPATH}:/root/.cache/huggingface/hub
    ports:
      - "15000:15000"
    environment:
      - HF_TOKEN=${HF_TOKEN}
      - HF_HUB_OFFLINE=1
    command: >
      --model nvidia/Llama-3.1-8B-Instruct-NVFP4
      --quantization modelopt_fp4
      --hf-overrides '{"tie_word_embeddings": false}'
      --served-model-name llm-server
      --max-model-len 32768
      --gpu-memory-utilization 0.6
      --kv-cache-dtype turboquant_4bit_nc
      --port 15000
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    depends_on:
      embedding:
        condition: service_healthy
      reranker:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:15000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 1800s
    restart: unless-stopped


  embedding:
    image: vllm/vllm-openai:latest
    container_name: embedding-server
    runtime: nvidia
    volumes:
      - ${HUGGINGFACE_QUANTIZE_FOLDERPATH}:/root/.cache/huggingface/hub
    ports:
      - "15001:15001"
    environment:
      - HF_TOKEN=${HF_TOKEN}
      - HF_HUB_OFFLINE=1
    command: >
      --model BAAI/bge-m3
      --served-model-name embedding-server
      --max-model-len 4096
      --gpu-memory-utilization 0.15
      --port 15001
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:15001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 300s
    restart: unless-stopped


  reranker:
    image: vllm/vllm-openai:latest
    container_name: reranker-server
    runtime: nvidia
    volumes:
      - ${HUGGINGFACE_QUANTIZE_FOLDERPATH}:/root/.cache/huggingface/hub
    ports:
      - "15002:15002"
    environment:
      - HF_TOKEN=${HF_TOKEN}
      - HF_HUB_OFFLINE=1
    command: >
      --model BAAI/bge-reranker-v2-m3
      --served-model-name reranker-server
      --max-model-len 4096
      --gpu-memory-utilization 0.15
      --port 15002
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:15002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 300s
    restart: unless-stopped


  backend:
    build:
      context: .
      dockerfile: deployment/docker/backend.Dockerfile
    container_name: backend-server
    runtime: nvidia
    ports:
      - "8000:8000"
    environment:
      - LLM_URL=http://LLM:15000/v1
    depends_on:
      LLM:
        condition: service_healthy
      embedding:
        condition: service_healthy
      reranker:
        condition: service_healthy
      database:
        condition: service_healthy
      database_admin:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped


# TODO Add postgres and pgadmin for advanced RAG support
  database:
    image: pgvector/pgvector:pg16 # Postgres + PGVector for VDB
    container_name: database-server
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/database/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
  

  database_admin:
    image: dpage/pgadmin4:latest
    container_name: database-admin-server
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "127.0.0.1:5000:5000"
    volumes:
      - postgres_admin_data:/var/lib/pgadmin
    depends_on:
      database:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://localhost:80/misc/ping').status==200 else sys.exit(1)\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped


  frontend:
    build:
      context: .
      dockerfile: deployment/docker/frontend.Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    container_name: frontend-server
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped


  ngrok:
    image: ngrok/ngrok:latest
    container_name: ngrok-tunnel
    environment:
      - NGROK_AUTHTOKEN=${NGROK_TOKEN}
    ports:
      - "4040:4040"
    volumes:
      - ./deployment/ngrok/ngrok.yaml:/etc/ngrok.yaml
    command: ["start", "--all", "--config", "/etc/ngrok.yaml"]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4040/api/tunnels"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    restart: unless-stopped


networks:
  default:
    name: ai_summariser_and_qa_net
    external: true

volumes:
  postgres_data:
    name: postgres_database
    # external: true
  postgres_admin_data:
    name: postgres_admin
    # external: true
  
  