services:

  LLM:
    image: vllm/vllm-openai:latest
    container_name: LLM-server
    runtime: nvidia
    shm_size: "2gb"
    volumes:
      - ${HUGGINGFACE_QUANTIZE_FOLDERPATH}:/root/.cache/huggingface/hub
    ports:
      - "8000:8000"
    environment:
      - HF_TOKEN=${HF_TOKEN}
      - HF_HUB_OFFLINE=1
    command: >
      --model /root/.cache/huggingface/hub/models--google--gemma-4-E2B-it-quantized
      --served-model-name gemma4
      --max-model-len 4096
      --gpu-memory-utilization 0.7
      --port 8000
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 1800s
    restart: unless-stopped