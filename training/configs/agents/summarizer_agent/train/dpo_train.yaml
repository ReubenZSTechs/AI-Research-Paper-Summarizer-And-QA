model_name_or_path: google/gemma-4-E2B-it


### Method
stage: dpo
do_train: true
do_eval: true
do_predict: false
finetuning_type: lora
quantization_bit: 4
quantization_type: nf4


### LoRA Config
lora_rank: 16
lora_alpha: 32
lora_dropout: 0.05
lora_target: all


### DPO Config
pref_beta: 0.1
pref_loss: sigmoid


### Reference Model
ref_model: google/gemma-4-E2B-it


### Dataset
dataset_dir: ./training/datasets/formatted/dpo/train
dataset: summarizer_train_dpo
eval_dataset: summarizer_val_dpo
template: gemma4


### Output
output_dir: ./training/outputs/adapters/dpo/summarizer
logging_steps: 1
save_steps: 50
save_total_limit: 5
plot_loss: true
report_to: tensorboard


### Train
per_device_train_batch_size: 2
gradient_accumulation_steps: 8
learning_rate: 2e-5
num_train_epochs: 5
lr_scheduler_type: cosine
warmup_steps: 50


# Eval
per_device_eval_batch_size: 2


# Mixed Precision
bf16: true